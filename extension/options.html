<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReCall Extension Settings</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f9fafb;
      color: #1f2937;
      padding: 40px 20px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      padding: 32px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    h1 {
      font-size: 28px;
      margin-bottom: 8px;
      color: #3b82f6;
    }

    .subtitle {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-weight: 500;
      margin-bottom: 8px;
      color: #374151;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 14px;
      font-family: 'Courier New', monospace;
    }

    input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .help-text {
      font-size: 12px;
      color: #6b7280;
      margin-top: 6px;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 32px;
    }

    .btn {
      padding: 12px 24px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #3b82f6;
      color: white;
      flex: 1;
    }

    .btn-primary:hover {
      background: #2563eb;
    }

    .btn-secondary {
      background: #10b981;
      color: white;
    }

    .btn-secondary:hover {
      background: #059669;
    }

    #status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 6px;
      font-size: 14px;
      display: none;
    }

    #status.success {
      background: #d1fae5;
      color: #065f46;
    }

    #status.error {
      background: #fee2e2;
      color: #991b1b;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ReCall Extension Settings</h1>
    <p class="subtitle">Configure your ReCall API connection</p>

    <form id="settings-form">
      <div class="form-group">
        <label for="api-url">API URL</label>
        <input
          type="url"
          id="api-url"
          placeholder="http://localhost:8001"
          required
        />
        <p class="help-text">
          The URL where your ReCall backend is running (default: http://localhost:8001)
        </p>
      </div>

      <div class="form-group">
        <label for="auth-token">Authentication Token (Optional)</label>
        <input
          type="password"
          id="auth-token"
          placeholder="Leave empty if auth is disabled"
        />
        <p class="help-text">
          Your ReCall API token. Leave empty if you haven't configured authentication yet.
        </p>
      </div>

      <div class="actions">
        <button type="submit" class="btn btn-primary">Save Settings</button>
        <button type="button" id="test-connection" class="btn btn-secondary">Test Connection</button>
      </div>

      <div id="status"></div>
    </form>
  </div>

  <script src="options.js"></script>
</body>
</html>
